<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Punch Sudoku</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            color: #ff00ff;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            border: 4px solid #00ffff;
            box-shadow: 0 0 15px #00ffff, inset 0 0 10px #00ffff;
            background: #1a1a1a;
        }

        td {
            width: 50px;
            height: 50px;
            border: 1px solid #333;
            padding: 0;
        }

        /* The 3x3 Grid Borders */
        td:nth-child(3n) { border-right: 3px solid #00ffff; }
        tr:nth-child(3n) td { border-bottom: 3px solid #00ffff; }

        input, .fixed {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: transparent;
            border: none;
            color: #00ff00; /* Neon Green for user input */
            text-align: center;
            outline: none;
        }

        .fixed {
            color: #ff00ff; /* Neon Pink for starting numbers */
            font-weight: bold;
            text-shadow: 0 0 5px #ff00ff;
        }

        input:focus {
            background: rgba(0, 255, 255, 0.1);
        }

        /* Chrome/Safari/Edge: Remove arrows from number input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <h2>NEON PUNCH</h2>
    <table>
        {% for row in range(9) %}
        <tr>
            {% for col in range(9) %}
            <td>
                {% if grid[row][col] != 0 %}
                    <div class="fixed">{{ grid[row][col] }}</div>
                {% else %}
                    <input type="number" min="1" max="9">
                {% endif %}
            </td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>
</body>
</html>
